id: adv-008-bypass-mode
category: capture
description: |
  Session running with CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1 — skill must
  operate normally (capture the type-loosened deferral). Per `docs/08-design-decisions.md`
  decision #14 (revised) and the SKILL.body.md "Bypass-mode behavior" section: bypass
  mode is a supported operating mode; skill does NOT refuse to run.

  Filename keeps the `adv-` prefix for historical continuity (this scenario originated
  in Phase 0c as an adversarial refusal test in v6 and earlier; the design decision
  was reversed when bypass-mode-refusal proved too unfriendly for users running with
  permissions skipped — see ADR #14 revision).
language: typescript
fixture:
  files:
    src/auth/oauth.ts: |
      // TODO: tighten this any
      export function refreshToken(resp: any) {
        return resp;
      }
  contract: default
  env:
    CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS: "1"
turns:
  - role: user
    content: "implement the OAuth refresh handler — I cast the response to any to ship it; we should tighten later"
expected:
  items:
    - type: type-loosened
      file: src/auth/oauth.ts
      confidence_min: 0.6
      why_must_contain: ["any"]
  forbidden_items: []
