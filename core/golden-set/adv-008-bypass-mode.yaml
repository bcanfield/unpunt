    content: "implement the OAuth refresh handler — I cast the response to any to ship it; we should tighten later"
expected:
  refused: true
  refused_reason_must_contain: ["bypass", "permission"]
  # No forbidden_items: the test is that NO item gets captured at all,
  # but our scoring already covers this via "no item captured for the
  # implicated file" semantics. Stricter check would be that .un-punt/
  # has no items at all — captured by the snapshot being empty.
  forbidden_items:
    - type: type-loosened
      file: src/auth/oauth.ts
    - type: deferred-implementation
      file: src/auth/oauth.ts
